<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Support monsmain — donate with cryptocurrency or Iranian Rial">
    <meta name="theme-color" content="#09121f">
    <meta property="og:title" content="monsmain — Financial Support">
    <meta property="og:description" content="Your contribution empowers me to create more and better content.">
    <meta property="og:type" content="website">
    <title data-lang-key="page_title">حمایت مالی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
    <canvas id="shader-bg"></canvas>
    <div id="transition-overlay"></div>
    <div id="intro-overlay">
        <div class="intro-text" id="intro-text"></div>
        <div class="intro-bar"><div class="intro-bar-fill" id="intro-bar-fill"></div></div>
    </div>

    <div class="container">
        <header>
            <div id="lang-switcher" class="lang-switcher">
                <button data-lang="en">EN</button>
                <span class="lang-sep">/</span>
                <button data-lang="fa" class="active">FA</button>
            </div>
            <img src="images/Logo.png" alt="Logo" class="main-logo">
            <div class="section-tag" data-reveal>/// DONATE</div>
            <h1 data-lang-key="main_title">حمایت از فعالیت من</h1>
            <p data-lang-key="main_subtitle">کمک شما به من انگیزه می‌دهد تا محتوای بهتر و بیشتری تولید کنم، هر مبلغی برای من ارزشمند است.</p>
        </header>

        <nav id="tab-container" class="tab-nav" data-reveal>
            <button class="tab-btn active" data-tab="crypto">
                <span class="tab-icon tab-icon-crypto">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.5 7.5h3.8a2.3 2.3 0 0 1 0 4.6H9.5zm0 4.6h4.2a2.4 2.4 0 0 1 0 4.8H9.5zm0 0v3.4M8 7.5h1.5M8 16.5h1.5M11 18v1.5M11 4.5V6"/>
                    </svg>
                </span>
                <span class="tab-label" data-lang-key="tab_crypto">ارز دیجیتال</span>
                <span class="tab-desc" data-lang-key="tab_crypto_desc">USDT، ترون، اتریوم، سولانا و...</span>
            </button>
            <button class="tab-btn" data-tab="rial">
                <span class="tab-icon tab-icon-rial">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M7 5c2 1 3 2.5 3 5s-1 4-3 5c2 1 3 2.5 3 5M17 5c-2 1-3 2.5-3 5s1 4 3 5c-2 1-3 2.5-3 5M5 12h14"/>
                    </svg>
                </span>
                <span class="tab-label" data-lang-key="tab_rial">ریالی (تومان)</span>
                <span class="tab-desc" data-lang-key="tab_rial_desc">پرداخت به تومان</span>
            </button>
        </nav>

        <section class="tab-panel active" data-panel="crypto">
            <div class="panel-tag" data-reveal>/// CRYPTO WALLETS</div>
            <main id="wallet-container"></main>
        </section>

        <section class="tab-panel" data-panel="rial">
            <div class="panel-tag" data-reveal>/// RIAL DONATION</div>
            <main id="rial-container"></main>
        </section>

        <footer data-reveal>
            <div class="section-tag">/// FOLLOW</div>
            <div class="social-links">
                <a href="https://github.com/monsmain" target="_blank" aria-label="GitHub" rel="noopener">
                    <img src="images/github.png" alt="GitHub">
                </a>
                <a href="https://t.me/monsmain" target="_blank" aria-label="Telegram" rel="noopener">
                    <img src="images/telegram.png" alt="Telegram">
                </a>
                <a href="https://youtube.com/monsmain" target="_blank" aria-label="YouTube" rel="noopener">
                    <img src="images/youtube.png" alt="YouTube">
                </a>
                <a href="https://x.com/mons_main" target="_blank" aria-label="X" rel="noopener">
                    <img src="images/x.png" alt="X">
                </a>
            </div>
            <p data-lang-key="footer_thanks">از حمایت شما سپاسگزارم❤️</p>
        </footer>
    </div>

    <div id="qr-overlay" class="qr-overlay">
        <div class="qr-modal">
            <button class="qr-close" id="qr-close">&times;</button>
            <div class="qr-tag">/// SCAN</div>
            <h3 class="qr-title" id="qr-title"></h3>
            <div id="qr-code" class="qr-code"></div>
            <p class="qr-hint" data-lang-key="qr_hint">اسکن کنید با کیف پول</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="shader.js?v=12"></script>
    <script src="script.js?v=12"></script>
</body>
</html>
