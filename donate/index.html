<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Support monsmain — donate with cryptocurrency or Iranian Rial">
    <meta name="theme-color" content="#0d0f18">
    <meta property="og:title" content="monsmain — Financial Support">
    <meta property="og:description" content="Your contribution empowers me to create more and better content.">
    <meta property="og:type" content="website">
    <title data-lang-key="page_title">حمایت مالی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Vazirmatn:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <canvas id="galaxy-bg"></canvas>
    <div id="transition-overlay"></div>
    <div id="qr-modal" class="qr-modal" aria-hidden="true">
        <div class="qr-modal-content">
            <button class="qr-close" aria-label="Close">&times;</button>
            <h3 class="qr-title" data-lang-key="qr_scan">آدرس را اسکن کنید</h3>
            <canvas id="qr-canvas" width="220" height="220"></canvas>
            <p class="qr-address" id="qr-address-text"></p>
        </div>
    </div>

    <div class="container">
        <header>
            <div id="lang-switcher" class="lang-switcher">
                <button data-lang="en">EN</button>
                <span class="lang-separator">/</span>
                <button data-lang="fa" class="active">FA</button>
            </div>
            <img src="images/Logo.png" alt="Logo" class="main-logo">
            <h1 data-lang-key="main_title">حمایت از فعالیت من</h1>
            <p data-lang-key="main_subtitle">کمک شما به من انگیزه می‌دهد تا محتوای بهتر و بیشتری تولید کنم، هر مبلغی برای من ارزشمند است.</p>
        </header>

        <nav id="tab-container" class="tab-nav">
            <button class="tab-btn active" data-tab="crypto">
                <span class="tab-icon crypto-tab-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/>
                        <path d="M12 2v20"/>
                        <path d="M2 7l10 5 10-5"/>
                    </svg>
                </span>
                <span class="tab-label" data-lang-key="tab_crypto">ارز دیجیتال</span>
                <span class="tab-desc" data-lang-key="tab_crypto_desc">USDT، ترون، اتریوم، سولانا و...</span>
            </button>
            <button class="tab-btn" data-tab="rial">
                <span class="tab-icon rial-tab-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <path d="M2 10h20"/>
                    </svg>
                </span>
                <span class="tab-label" data-lang-key="tab_rial">ریالی (تومان)</span>
                <span class="tab-desc" data-lang-key="tab_rial_desc">پرداخت به تومان</span>
            </button>
        </nav>

        <section class="tab-panel active" data-panel="crypto">
            <main id="wallet-container"></main>
        </section>

        <section class="tab-panel" data-panel="rial">
            <main id="rial-container"></main>
        </section>

        <footer>
            <div class="social-links">
                <a href="https://github.com/monsmain" target="_blank" aria-label="GitHub" rel="noopener">
                    <img src="images/github.png" alt="GitHub">
                </a>
                <a href="https://t.me/monsmain" target="_blank" aria-label="Telegram" rel="noopener">
                    <img src="images/telegram.png" alt="Telegram">
                </a>
                <a href="https://youtube.com/monsmain" target="_blank" aria-label="YouTube" rel="noopener">
                    <img src="images/youtube.png" alt="YouTube">
                </a>
                <a href="https://x.com/mons_main" target="_blank" aria-label="X" rel="noopener">
                    <img src="images/x.png" alt="X">
                </a>
            </div>
            <p data-lang-key="footer_thanks">از حمایت شما سپاسگزارم❤️</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="galaxy.js?v=7"></script>
    <script src="script.js?v=7"></script>
</body>
</html>
